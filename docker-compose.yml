
services:
  server:
    build: 
      context: ./server
    ports:
      - "4000:4000"
    volumes:
      # Mantém o banco de dados persistente em um Volume isolado do Docker
      - sqlite_data:/app/db_data
    user: root
    environment:
      - NODE_ENV=production
      - JWT_SECRET=sua_chave_secreta_super_segura
    restart: always

  client:
    build:
      context: ./client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: always

  updater:
    build:
      context: ./updater
    volumes:
      - sqlite_data:/app/db_data
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app/host_source
    restart: always

volumes:
  sqlite_data:
